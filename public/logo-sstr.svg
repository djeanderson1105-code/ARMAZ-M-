<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Rounded Rect background with border -->
  <rect width="512" height="512" rx="128" fill="url(#bg)" stroke="#1e293b" stroke-width="8"/>
  
  <!-- Glowing Hexagon element in the middle -->
  <polygon points="256,70 410,160 410,350 256,440 102,350 102,160" fill="none" stroke="url(#emerald)" stroke-width="12" filter="url(#glow)" opacity="0.8"/>
  
  <!-- Outer Tech dots -->
  <circle cx="256" cy="40" r="10" fill="#34d399" />
  <circle cx="472" cy="256" r="10" fill="#34d399" />
  <circle cx="256" cy="472" r="10" fill="#34d399" />
  <circle cx="40" cy="256" r="10" fill="#34d399" />
  
  <!-- Text SSTR -->
  <text x="256" y="275" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="110" fill="url(#emerald)" text-anchor="middle" letter-spacing="2">SSTR</text>
  
  <!-- Subtitle: Soluções & Trocas -->
  <text x="256" y="340" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="28" fill="#94a3b8" text-anchor="middle" letter-spacing="4">CONTROLE</text>
</svg>
